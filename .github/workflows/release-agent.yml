name: Build e Release

on:
  push:
    tags:
      - 'v*.*.*'   # ex: v1.0.0, v2.3.1, v1.0.0-beta.1
    paths:
      - 'projeto/agente/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para criar releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para o git describe

      - name: Pegar versão da tag
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
        # github.ref_name já vem como "v1.5.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build para todas as plataformas
        working-directory: ./projeto/agente
        run: |
          LDFLAGS="-s -w -X main.AppVersion=${{ env.VERSION }}"

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o moniedu.exe .
          zip moniedu_windows_amd64.zip moniedu.exe
          rm moniedu.exe

      - name: Criar GitHub Release e fazer upload dos assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            🚀 Release automática gerada pelo CI/CD
            Commit: ${{ github.sha }}
          files: |
            projeto/agente/moniedu_windows_amd64.zip
          make_latest: true

      - name: Apagar releases antigas (manter só 10)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true       # apaga a tag git junto com a release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
